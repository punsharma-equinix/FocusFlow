version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: focusflow-db
    environment:
      POSTGRES_DB: focusflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: focusflow-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/focusflow
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      APP_JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32chars}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: focusflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
